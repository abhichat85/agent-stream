[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-event-stream"
version = "0.1.0"
description = "Typed SSE event protocol for AI agents — token, tool_use, thinking, progress, done"
authors = [{ name = "Abhishek", email = "abhichat85@gmail.com" }]
license = { text = "MIT" }
requires-python = ">=3.11"
keywords = ["llm", "ai-agents", "sse", "streaming", "fastapi", "anthropic", "openai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/abhichat85/agent-stream"
Repository = "https://github.com/abhichat85/agent-stream"
Issues = "https://github.com/abhichat85/agent-stream/issues"
Changelog = "https://github.com/abhichat85/agent-stream/blob/main/CHANGELOG.md"

[project.optional-dependencies]
fastapi = ["fastapi>=0.100"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "fastapi>=0.100", "httpx>=0.27"]

[project.scripts]
agent-stream = "agent_stream.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["agent_stream"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
